  party-server:
    image: featurehub/party-server:1.9.5-RC
    restart: always
    user: 999:999
    volumes:
      - ./common-config:/etc/common-config
    environment:
      server.port: 8085
    env_file:
      - ./common.env
    ports:
      - 8085:8085
      - 8701:8701
    depends_on:
      - "db"
      - "kafka"

  # a second copy of the party server
